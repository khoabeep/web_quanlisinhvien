    <!-- GitHub Pages SPA redirect handler (from 404.html) -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <script type="module" crossorigin src="/web_quanlisinhvien/assets/index-4fM-dpfB.js"></script>
    <link rel="stylesheet" crossorigin href="/web_quanlisinhvien/assets/index-BZFjS_eV.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Relative path — works on both localhost and GitHub Pages subdirectory
          var base = document.querySelector('script[src]')?.src.replace(/[^/]*$/, '') || './';
          navigator.serviceWorker.register(base + 'sw.js')
            .then(reg => console.log('SW registered:', reg.scope))
            .catch(err => console.warn('SW registration failed:', err));
        });
      }
    </script>
  </body>
